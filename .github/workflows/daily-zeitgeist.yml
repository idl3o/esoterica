name: Daily Zeitgeist

on:
  schedule:
    # 08:00 UTC daily
    - cron: '0 8 * * *'
  workflow_dispatch: # manual trigger

jobs:
  zeitgeist:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Claude Code
        run: npm install -g @anthropic-ai/claude-code

      - name: Generate zeitgeist reading
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          DATE=$(date -u +%Y-%m-%d)
          DISPLAY_DATE=$(date -u +"%d %B %Y")
          FILE="synthesis/zeitgeist/zeitgeist-${DATE}.md"

          # Skip if today's reading already exists
          if [ -f "$FILE" ]; then
            echo "Reading for $DATE already exists, skipping."
            exit 0
          fi

          claude -p --allowedTools "WebSearch,WebFetch,Write" \
            "You are producing an integrated zeitgeist reading for ${DISPLAY_DATE}.

          The output is a single markdown file at ${FILE}.

          ## Gather Signal

          Run all twelve searches — six for what's happening, six for how it's being processed:

          World signal:
          1. \"major world news today\" (geopolitical)
          2. \"global economy financial markets news today\" (economic)
          3. \"scientific breakthroughs discoveries research 2026\" (scientific)
          4. \"AI technology breakthrough news this week\" (technological)
          5. \"culture society trends news this week\" (cultural)
          6. \"climate environment ecology news this week\" (ecological)

          Processing signal:
          7. \"trending on Twitter X today\" (trending discourse)
          8. \"reddit front page popular trending this week\" (Reddit pulse)
          9. \"TikTok viral trends this week 2026\" (video culture)
          10. \"Google Trends trending searches today\" (search intent)
          11. \"Hacker News trending AI tech discussion this week\" (tech discourse)
          12. \"subculture internet community emerging trend 2026\" (subculture signal)

          Follow up with 2-3 targeted searches on the biggest stories for depth.

          ## Read the Pattern

          Organise by temporal scale, not domain:
          - SURFACE: events that metabolise in days
          - CURRENT: trends that metabolise in weeks to months
          - DEEP: phase transitions that metabolise in years
          - TECTONIC: epoch markers that exceed any single reading

          For each item at every scale, show BOTH the signal and its processing — how the collective is metabolising it, refusing it, or failing to see it. The gap between event and processing is the diagnostic.

          ## Write the Reading

          Write the file at ${FILE} with this exact structure:

          # ZEITGEIST — ${DISPLAY_DATE}

          *A reading of the present moment. Signal and processing integrated. Silence embedded. Scale honoured.*

          ---

          ## SURFACE
          *Events that metabolise in days.*

          [3-5 items. Each: what happened + how it's being processed + what the gap reveals in italics]

          ---

          ## CURRENT
          *Trends that metabolise in weeks to months.*

          [3-5 items. Same integrated format. Name how different organs of the collective body metabolise the same signal]

          ---

          ## DEEP
          *Phase transitions that metabolise in years.*

          [2-3 items. More space — 2-3 paragraphs each. Embed the silence at every level]

          ---

          ## TECTONIC
          *Epoch markers. The fish too big for the net.*

          [1-2 items. Named, pointed at, honestly acknowledged as exceeding the format. No false domestication]

          ---

          ## CORRESPONDENCE
          *The same pattern at every scale.*

          [2-3 paragraphs. One pattern operating across personal, social, civilisational, ecological, cosmological scale simultaneously]

          ## STATE
          *The reading.*

          [2-3 paragraphs through metta-darshan and lila. End with THE EDGE — what's trying to emerge]

          ---

          Sources: [list URLs used]

          ## Principles

          - Scale before domain
          - Integration, not separation — every item shows signal AND processing
          - Silence is signal — what the collective refuses to process matters
          - Threshold honesty — name the fish too big for the net
          - Correspondence is structure — show the vertical pattern
          - Fidelity first — report what's actually happening, never bend events to fit narrative
          - The archive is the product — write as if someone reads this a year from now to understand what this moment felt like"

      - name: Commit and push
        run: |
          DATE=$(date -u +%Y-%m-%d)
          FILE="synthesis/zeitgeist/zeitgeist-${DATE}.md"

          if [ ! -f "$FILE" ]; then
            echo "No reading generated, skipping commit."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add "$FILE"

          # Extract headline from DEEP section for commit message
          HEADLINE=$(grep -A5 '## DEEP' "$FILE" | grep '^\*\*' | head -1 | sed 's/\*\*//g' | cut -c1-80)
          if [ -z "$HEADLINE" ]; then
            HEADLINE="daily reading"
          fi

          DISPLAY_DATE=$(date -u +"%d %b %Y")
          git commit -m "Add zeitgeist reading ${DISPLAY_DATE}: ${HEADLINE}"
          git push
